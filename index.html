<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Formatter</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- Header -->
    <header>
        <nav>
            <a href="#" class="logo">JSON Formatter</a>
            <a href="https://github.com/matsuda-ko-ji" target="_blank" rel="noopener noreferrer">GitHub</a>
        </nav>
    </header>
    <!-- Main -->
    <main>
        <section id="description">
            <h1>JSON Formatter</h1>
            <p>JSONを整形するツールです。</p>
        </section>
        <div class="json-layout">
            <section id="input-area">
                <label for="json-input">
                    JSON入力
                </label>
                <textarea
                    id="json-input"
                    placeholder="ここにJSONを入力してください"></textarea>
            </section>
            <section id="output-area">
                <label for="json-output">
                    結果
                </label>
                <textarea
                    id="json-output"
                    readonly></textarea>
            </section>
        </div>
        <section id="actions">
            <button type="button" id="format-button">
                整形
            </button>
            <button type="button" id="minify-button">
                圧縮
            </button>
             <button type="button" id="copy-button" disabled>
                コピー
            </button>

            <button type="button" id="clear-button">
                クリア
            </button>
        </section>
        <section id="message-area" aria-live="polite">
            
        </section>
    </main>
    <!-- Footer -->
    <footer>
        <p>
            <a href="https://github.com/matsuda-ko-ji"
            target="_blank"
            rel="noopener noreferrer">
                GitHub
            </a>
        </p>
        <p>
            &copy; 2026 JSON Formatter
        </p>
    </footer>

    <script src="js/main.js"></script>
</body>
